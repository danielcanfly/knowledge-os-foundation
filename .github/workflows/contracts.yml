name: Contract validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python scripts/validate_contracts.py
      - run: python -m pytest -q
      - run: python -m compileall -q scripts tests reference
      - name: Reference vertical slice
        run: |
          python reference/knowledge_engine.py build \
            --bundle examples/okf-bundle \
            --output .artifacts \
            --release-time 2026-07-02T12:00:00Z
          python reference/knowledge_engine.py query \
            --store .artifacts \
            --channel staging \
            --query "knowledge compiler" \
            --audience internal
